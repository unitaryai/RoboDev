{{- if .Values.webhook.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "robodev.fullname" . }}-webhook
  labels:
    {{- include "robodev.labels" . | nindent 4 }}
spec:
  type: {{ .Values.webhook.service.type | default "ClusterIP" }}
  ports:
    - port: {{ .Values.webhook.port }}
      targetPort: webhook
      protocol: TCP
      name: webhook
  selector:
    {{- include "robodev.selectorLabels" . | nindent 4 }}
{{- end }}
