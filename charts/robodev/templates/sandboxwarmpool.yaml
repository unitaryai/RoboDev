{{- if and .Values.sandbox.enabled .Values.sandbox.warmPool.enabled }}
apiVersion: sandbox.kubernetes.io/v1alpha1
kind: SandboxWarmPool
metadata:
  name: {{ include "robodev.fullname" . }}-warm-pool
  labels:
    {{- include "robodev.labels" . | nindent 4 }}
spec:
  size: {{ .Values.sandbox.warmPool.size | default 3 }}
  runtimeClassName: {{ .Values.sandbox.runtimeClass | default "gvisor" }}
  selector:
    matchLabels:
      app: robodev-agent
{{- end }}
